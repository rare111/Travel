<script>
// -------------------------
// Global variables
// -------------------------
let travelEntries = [];
let currentUser = null;
let polylines = [];
let markers = [];

const colors = [
    "#007bff", "#ff4b5c", "#28a745", "#ff9800", "#9c27b0",
    "#00bcd4", "#795548", "#e91e63", "#3f51b5", "#8bc34a",
    "#ffc107", "#673ab7", "#009688", "#cddc39", "#ff5722"
];

// -------------------------
// Map initialization
// -------------------------
let map = L.map('map').setView([37.5, -119.5], 6);
window.addEventListener("resize", () => {
    if (map) {
        // Safe timeout gives the CSS media queries 300ms to finish 
        // stacking into mobile view before updating the map size
        setTimeout(() => { 
            map.invalidateSize(); 
        }, 300);
    }
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
}).addTo(map);

// -------------------------
// Firebase Auth listener
// -------------------------
auth.onAuthStateChanged(async user => {
    currentUser = user || null;

    if (user) {
        const doc = await db.collection("users").doc(user.uid).get();
        const data = doc.data();
        currentUser.role = data ? data.role : "user";
    }
});

// -------------------------
// Geocoding
// -------------------------
async function geocode(city) {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city + ", California")}`;
    const response = await fetch(url);
    const data = await response.json();
    if (data.length === 0) return null;
    return {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon)
    };
}

// -------------------------
// Clear map
// -------------------------
function clearMap() {
    polylines.forEach(pl => map.removeLayer(pl));
    markers.forEach(m => map.removeLayer(m));
    polylines = [];
    markers = [];
}

// -------------------------
// Draw all routes
// -------------------------
async function drawAllRoutes() {
    clearMap();

    for (let entry of travelEntries) {
        const srcCity = await geocode(entry.source);
        const dstCity = await geocode(entry.destination);

        if (!srcCity || !dstCity) continue;

        const srcIcon = L.divIcon({
            className: "custom-icon",
            html: `<div style="width:14px;height:14px;border-radius:50%;background:${entry.color};border:2px solid white;"></div>`
        });

        const dstIcon = L.divIcon({
            className: "custom-icon",
            html: `<div style="width:14px;height:14px;border-radius:50%;background:${entry.color};border:2px solid black;"></div>`
        });

        const srcMarker = L.marker([srcCity.lat, srcCity.lon], { icon: srcIcon }).addTo(map);
        const dstMarker = L.marker([dstCity.lat, dstCity.lon], { icon: dstIcon }).addTo(map);

        markers.push(srcMarker, dstMarker);

        const line = L.polyline(
            [
                [srcCity.lat, srcCity.lon],
                [dstCity.lat, dstCity.lon]
            ],
            { color: entry.color, weight: 4 }
        ).addTo(map);

        polylines.push(line);
    }

    if (polylines.length > 0) {
        const group = L.featureGroup(polylines);
        map.fitBounds(group.getBounds());
    }
}
console.log("travelEntries:", travelEntries);
// -------------------------
// Sidebar rendering
// -------------------------
function renderSidebar() {
    const list = document.getElementById("entriesList");
    list.innerHTML = "";

    travelEntries.forEach((entry, index) => {
        const div = document.createElement("div");
        div.classList.add("entry");

        const header = document.createElement("div");
        header.classList.add("entry-header");

        const left = document.createElement("div");
        const colorDot = document.createElement("span");
        colorDot.classList.add("color-dot");
        colorDot.style.backgroundColor = entry.color;
        left.appendChild(colorDot);
        left.appendChild(document.createTextNode(entry.name));

        const actions = document.createElement("div");
        actions.classList.add("entry-actions");

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.onclick = () => editEntry(index);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteEntry(entry.id);

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        header.appendChild(left);
        header.appendChild(actions);

        const info = document.createElement("div");
        info.textContent = `${entry.source} → ${entry.destination} (${entry.from} to ${entry.to})`;

        div.appendChild(header);
        div.appendChild(info);

        list.appendChild(div);
    });
}

// -------------------------
// Delete entry (Firestore)
// -------------------------
async function deleteEntry(id) {
    await db.collection("travelEntries").doc(id).delete();
}

// -------------------------
// Edit entry (load into form)
// -------------------------
function editEntry(index) {
    const entry = travelEntries[index];

    document.getElementById("name").value = entry.name;
    document.getElementById("number").value = entry.number;
    document.getElementById("fromDate").value = entry.from;
    document.getElementById("toDate").value = entry.to;
    document.getElementById("source").value = entry.source;
    document.getElementById("destination").value = entry.destination;
}

// -------------------------
// Calendar generation
// -------------------------
function generateCalendar(month, year) {
    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";
    
    document.getElementById("calTitle").textContent =
        new Date(year, month).toLocaleString('default', { month: 'long' }) + " " + year;
        
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // Render empty slots for the first week alignment
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
    }
    
    // Render actual days
    for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div");
        cell.classList.add("day");
        cell.textContent = day;
        
        const cellDate = new Date(year, month, day);
        
        // travelEntries is global data array
        travelEntries.forEach(entry => {
            // SAFETY CHECK: If dates are missing or aren't strings, skip to prevent a crash
            if (!entry.from || !entry.to || typeof entry.from !== 'string' || typeof entry.to !== 'string') {
                return; 
            }
			
            const [fromYear, fromMonth, fromDay] = entry.from.split('-').map(Number);
            const [toYear, toMonth, toDay] = entry.to.split('-').map(Number);
            
            const from = new Date(fromYear, fromMonth - 1, fromDay);
            const to = new Date(toYear, toMonth - 1, toDay);
            
            // Highlight matching dates
            if (cellDate >= from && cellDate <= to) {
                cell.classList.add("highlight");
                cell.style.backgroundColor = entry.color;
                cell.style.color = "white";
                
                const tooltip = document.createElement("div");
                tooltip.classList.add("tooltip");
                tooltip.innerHTML = `
                    <strong>${entry.name}</strong><br>
                    ${entry.number}<br>
                    ${entry.source} to ${entry.destination}<br>
                    ${entry.from} to ${entry.to}
                `;
                cell.appendChild(tooltip);
				
            }
        });
        cell.addEventListener('click', (e) => {
            const tooltip = cell.querySelector('.tooltip');
            if (tooltip) {
                // Check current state (accounting for blank initial styles)
                const isVisible = tooltip.style.display === 'block';
                
                // Hide all other active tooltips across the calendar
                document.querySelectorAll('.tooltip').forEach(t => t.style.display = 'none');
                
                // Toggle this specific one
                tooltip.style.display = isVisible ? 'none' : 'block';
                e.stopPropagation(); 
            }
        });
        
        // Finally, add the completely configured cell to your calendar grid
        grid.appendChild(cell);
    }
}
// Global click handler to dismiss open tooltips when tapping empty spaces (Keep this at the root of your file)
document.addEventListener('click', () => {
    document.querySelectorAll('.tooltip').forEach(t => t.style.display = 'none');
});
document.getElementById("nextMonth").addEventListener("click", () => {
    currentMonth++;
    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    }
    generateCalendar(currentMonth, currentYear);

// Keep track of the current date globally
const today = new Date();
let currentMonth = today.getMonth();
let currentYear = today.getFullYear();
currentUser = null;

// DOM Elements
const loginModal = document.getElementById("loginModal");
const adminLoginBtn = document.getElementById("adminLoginBtn");
const closeModal = document.getElementById("closeModal");
const submitLogin = document.getElementById("submitLogin");
const errorMsg = document.getElementById("errorMsg");

// 1. Firebase Auth Real-Time Observer (Handles verification & UI updates)
firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user; 
    if (adminLoginBtn) {
            adminLoginBtn.textContent = "Logout";
        }    
        try {
            // Get the role just to know if we should show/hide "Delete" buttons in the UI
            const doc = await firebase.firestore().collection("users").doc(user.uid).get();
            const data = doc.data();
            currentUser.role = (data && data.role) ? data.role : "user";
        } catch (error) {
            console.log("Could not fetch explicit role, defaulting to standard user.");
            currentUser.role = "user";
        }
    } else {
        currentUser = null;
        
        // 3. CHANGE TEXT BACK TO ADMIN LOGIN WHEN SIGNED OUT
        if (adminLoginBtn) {
            adminLoginBtn.textContent = "Admin Login";
        }
    }

    // ALWAYS load the map and calendar data for everyone right away!
generateCalendar(currentMonth, currentYear);
    // Always draw/refresh the calendar grid structure
    
});

// 2. Dual-Purpose Button Action (Handles Popup open OR Logout execution)
adminLoginBtn.addEventListener("click", (e) => {
    e.preventDefault();
    if (auth.currentUser) {
        // If a user is currently signed in, clicking this button LOGS THEM OUT
        auth.signOut().then(() => {
            alert("Logged out successfully.");
        }).catch((error) => {
            console.error("Logout Error:", error);
        });
    } else {
        // If logged out, clicking this button OPENS THE POPUP
        loginModal.style.setProperty("display", "flex", "important");
        errorMsg.style.display = "none";
    }
});

// 3. Handle Admin Authentication Request
submitLogin.addEventListener("click", () => {
    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            // Clear inputs and hide overlay card on success
            loginModal.style.display = "none";
            document.getElementById("adminEmail").value = "";
            document.getElementById("adminPassword").value = "";
        })
        .catch((error) => {
            // Display error messages (e.g., wrong password, user not found) inside the modal
            errorMsg.textContent = error.message;
            errorMsg.style.display = "block";
        });
});

// 4. Modal Window Close Handlers
closeModal.addEventListener("click", () => { loginModal.style.display = "none"; });
window.addEventListener("click", (e) => {
    if (e.target === loginModal) { loginModal.style.display = "none"; }
});

// 5. Helper function to toggle functional elements (like Edit/Delete buttons)
function toggleAdminControls(isAdmin) {
    const editButtons = document.querySelectorAll(".edit-btn, .delete-btn");
    editButtons.forEach(btn => {
        btn.style.display = isAdmin ? "inline-block" : "none";
    });
}
document.addEventListener('keydown', (event) => {
    // Block F12
    if (event.key === 'F12') {
        event.preventDefault();
    }
    // Block Ctrl+Shift+I (Chrome/Edge/Firefox) or Cmd+Opt+I (Mac)
    if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key === 'I') {
        event.preventDefault();
    }
    // Block Ctrl+U (View Source)
    if ((event.ctrlKey || event.metaKey) && event.key === 'u') {
        event.preventDefault();
    }
});
